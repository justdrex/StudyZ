<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up – StudyZ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <a href="/home">
                <img src="/assets/logo.png" alt="Logo" class="logo-img">
            </a>
        </div>
    </nav>

    <div class="auth-card">
        <h1 class="auth-title">Create account</h1>

        <form id="signupForm">
            <div class="auth-field">
                <label class="auth-label" for="displayName">Display name</label>
                <input class="auth-input" id="displayName" type="text" placeholder="e.g. Adam Novák" autocomplete="name">
            </div>

            <div class="auth-field" style="margin-top:14px">
                <label class="auth-label" for="email">Email</label>
                <input class="auth-input" id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="auth-field" style="margin-top:14px">
                <label class="auth-label" for="password">Password</label>
                <input class="auth-input" id="password" type="password" placeholder="At least 6 characters" autocomplete="new-password" required minlength="6">
            </div>

            <div class="auth-error" id="errorMsg"></div>

            <button class="auth-btn" id="submitBtn" type="submit">Create account</button>
        </form>

        <div id="successMsg" style="display:none" class="auth-success">
            Check your email for a confirmation link, then sign in.
        </div>

        <p class="auth-link">Already have an account? <a href="/login">Sign in</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://dldbcbixsysxcvthtrqs.supabase.co',
            'sb_publishable_woDI3ajr1Wgo9usOnQoCmg_QM9ncX7E'
        );

        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '/home';
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const displayName = document.getElementById('displayName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Creating account…';
            errorMsg.textContent = '';

            const { data, error } = await sb.auth.signUp({
                email,
                password,
                options: { data: { display_name: displayName } }
            });

            if (error) {
                errorMsg.textContent = error.message;
                btn.disabled = false;
                btn.textContent = 'Create account';
                return;
            }

            // Update display_name in profiles table
            if (data.session && displayName) {
                await sb.from('profiles').update({ display_name: displayName }).eq('id', data.user.id);
            }

            if (data.session) {
                window.location.href = '/home';
            } else {
                document.getElementById('signupForm').style.display = 'none';
                document.getElementById('successMsg').style.display = 'block';
            }
        });
    </script>
</body>
</html>
