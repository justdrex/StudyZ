<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in – StudyZ</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-logo">
            <a href="/home">
                <img src="/assets/logo.png" alt="Logo" class="logo-img">
            </a>
        </div>
    </nav>

    <div class="auth-card">
        <h1 class="auth-title">Sign in</h1>

        <form id="loginForm">
            <div class="auth-field">
                <label class="auth-label" for="email">Email</label>
                <input class="auth-input" id="email" type="email" placeholder="you@example.com" autocomplete="email" required>
            </div>

            <div class="auth-field" style="margin-top:14px">
                <label class="auth-label" for="password">Password</label>
                <input class="auth-input" id="password" type="password" placeholder="••••••••" autocomplete="current-password" required>
            </div>

            <div class="auth-error" id="errorMsg"></div>

            <button class="auth-btn" id="submitBtn" type="submit">Sign in</button>
        </form>

        <p class="auth-link">Don't have an account? <a href="/signup">Sign up</a></p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const sb = supabase.createClient(
            'https://dldbcbixsysxcvthtrqs.supabase.co',
            'sb_publishable_woDI3ajr1Wgo9usOnQoCmg_QM9ncX7E'
        );

        sb.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = '/home';
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.disabled = true;
            btn.textContent = 'Signing in…';
            errorMsg.textContent = '';

            const { error } = await sb.auth.signInWithPassword({ email, password });

            if (error) {
                errorMsg.textContent = error.message;
                btn.disabled = false;
                btn.textContent = 'Sign in';
            } else {
                window.location.href = '/home';
            }
        });
    </script>
</body>
</html>
